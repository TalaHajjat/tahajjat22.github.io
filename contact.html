<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Me - Tala Amjad Hajjat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="container">
      <h1>Contact Me</h1>
      <p class="subtitle">Send your message using the form below</p>
    </div>
  </header>

  <nav>
    <div class="container nav-container">
      <a href="index.html">Home</a>
      <a href="contact.html">Contact Me</a>
    </div>
  </nav>

  <main class="container">
    <section class="card form-card">
      <h2>Visitor Form</h2>
      <form id="contactForm">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" />

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email address" />

        <label for="country">Country</label>
        <input type="text" id="country" name="country" placeholder="Enter your country" />

        <label for="comments">Comments</label>
        <textarea id="comments" name="comments" rows="6" placeholder="Write your comments here"></textarea>

        <button type="submit">Submit</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Tala Amjad Hajjat | SID: 165500</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
